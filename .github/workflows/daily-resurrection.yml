name: Daily Resurrection

on:
  schedule:
    - cron: "0 13 * * *"   # 09:00 US Eastern (ET) - morning run
    - cron: "0 16 * * *"   # 12:00 US Eastern (ET) - midday run
    - cron: "0 0 * * *"    # 20:00 US Eastern (ET) - evening run
  workflow_dispatch:

permissions:
  contents: write
  discussions: write

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

jobs:
  resurrect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily pipeline
        run: python scripts/runner.py
        working-directory: ${{ github.workspace }}

      - name: Commit and push changes
        run: |
          git config user.name "mohabdelkarim"
          git config user.email "mohaabdelkarim2@gmail.com"
          git add -A
          COMMIT_MSG=$(printf 'feat(resurrection): resurrect %s#%s\n\nIssue: %s\nImpact: %s/10  Effort: ~%sh  PoC: %s\nRef: %s' \
            "$ISSUE_REPO" "$ISSUE_NUMBER" "$ISSUE_TITLE" "$IMPACT_SCORE" "$EFFORT_HOURS" "$HAS_POC" "$ISSUE_URL")
          git diff --cached --quiet || git commit -m "$COMMIT_MSG"
          git pull --rebase origin main
          git push origin main

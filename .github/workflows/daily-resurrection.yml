name: Daily Resurrection

on:
  schedule:
    - cron: "0 9 * * *"   # 09:00 UTC — EU midday | US West Coast morning
    - cron: "0 16 * * *"  # 16:00 UTC — EU late afternoon | US East Coast midday
    - cron: "0 19 * * *"  # 19:00 UTC — US evening (original run kept)
  workflow_dispatch:

permissions:
  contents: write
  discussions: write

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}


jobs:
  resurrect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily pipeline
        run: python scripts/runner.py
        working-directory: ${{ github.workspace }}

      - name: Commit and push changes
        run: |
          git config user.name "mohabdelkarim"
          git config user.email "mohaabdelkarim2@gmail.com"
          git add -A
          git diff --cached --quiet || git commit -m \
            "feat(resurrection): resurrect ${{ env.ISSUE_REPO }}#${{ env.ISSUE_NUMBER }}

            Issue: ${{ env.ISSUE_TITLE }}
            Impact: ${{ env.IMPACT_SCORE }}/10  Effort: ~${{ env.EFFORT_HOURS }}h  PoC: ${{ env.HAS_POC }}
            Ref: ${{ env.ISSUE_URL }}"
          git pull --rebase origin main
          git push origin main
